{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-microphone"></i> {% trans "Voice Report" %}</h3>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i> 
                        {% trans "Speak clearly in English or Xitsonga. Describe what happened, when, and where." %}
                    </div>
                    
                    <form method="post" id="voiceReportForm">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label">{% trans "Incident Category" %}</label>
                            <select name="category" class="form-control" required>
                                <option value="">{% trans "Select category..." %}</option>
                                {% for category in categories %}
                                <option value="{{ category.id }}">{{ category.get_name_display }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">{% trans "Voice Recording" %}</label>
                            <div class="text-center p-4 border rounded">
                                <button type="button" id="startRecordingBtn" class="btn btn-danger btn-lg">
                                    <i class="fas fa-microphone"></i> {% trans "Start Recording" %}
                                </button>
                                <button type="button" id="stopRecordingBtn" class="btn btn-secondary btn-lg" style="display:none;">
                                    <i class="fas fa-stop"></i> {% trans "Stop Recording" %}
                                </button>
                                <div id="recordingStatus" class="mt-2"></div>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">{% trans "Transcribed Text" %}</label>
                            <textarea name="transcribed_text" id="transcribedText" class="form-control" rows="5" placeholder="Your spoken words will appear here..."></textarea>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">{% trans "Location" %}</label>
                            <textarea name="location" class="form-control" rows="3" placeholder="e.g., Near Tzaneen Mall, Dan Village, Nkowankowa..." required></textarea>
                        </div>
                        
                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="fas fa-paper-plane"></i> {% trans "Submit Voice Report" %}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    
    // Check if browser supports speech recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // Will support multiple languages
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        
        recognition.onresult = function(event) {
            const transcript = Array.from(event.results)
                .map(result => result[0].transcript)
                .join('');
            
            document.getElementById('transcribedText').value = transcript;
        };
        
        recognition.onerror = function(event) {
            console.error('Speech recognition error:', event.error);
            document.getElementById('recordingStatus').innerHTML = 
                '<div class="alert alert-danger">Error: ' + event.error + '</div>';
        };
        
        recognition.onend = function() {
            document.getElementById('recordingStatus').innerHTML = 
                '<div class="alert alert-info">Recording stopped</div>';
            document.getElementById('startRecordingBtn').style.display = 'inline-block';
            document.getElementById('stopRecordingBtn').style.display = 'none';
            isRecording = false;
        };
        
        document.getElementById('startRecordingBtn').onclick = function() {
            if (recognition) {
                recognition.start();
                document.getElementById('recordingStatus').innerHTML = 
                    '<div class="alert alert-success">Recording... Speak now</div>';
                document.getElementById('startRecordingBtn').style.display = 'none';
                document.getElementById('stopRecordingBtn').style.display = 'inline-block';
                isRecording = true;
            } else {
                alert('Speech recognition not supported in this browser');
            }
        };
        
        document.getElementById('stopRecordingBtn').onclick = function() {
            if (recognition && isRecording) {
                recognition.stop();
            }
        };
    } else {
        document.getElementById('startRecordingBtn').disabled = true;
        document.getElementById('recordingStatus').innerHTML = 
            '<div class="alert alert-warning">Speech recognition not supported in your browser. Please type your report.</div>';
    }
</script>
{% endblock %}
{% endblock %}
