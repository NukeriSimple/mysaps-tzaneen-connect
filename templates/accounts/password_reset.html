{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3>Forgot Password? / U rivalile Phasiwedi?</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label>Email Address / Imeyili</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Send Reset Link / Rhumela Link</button>
                    </form>
                    <hr>
                    <a href="{% url 'accounts:login' %}">Back to Login / Buyela eka Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
