{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3>Set New Password / Veka Phasiwedi Leyintshwa</h3>
                </div>
                <div class="card-body">
                    {% if validlink %}
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label>New Password / Phasiwedi Leyintshwa</label>
                                <input type="password" name="new_password1" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Confirm Password / Tiyisisa Phasiwedi</label>
                                <input type="password" name="new_password2" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Reset Password / Lunghisa Phasiwedi</button>
                        </form>
                    {% else %}
                        <div class="alert alert-danger">
                            Invalid reset link. Please request a new one.
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
