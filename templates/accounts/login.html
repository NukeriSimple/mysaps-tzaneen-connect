{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-sign-in-alt"></i> Login to MySAPS Tzaneen Connect / Nghena eka MySAPS Tzaneen Connect</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">Username / Vito ro nghena</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password / Phasiwedi</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt"></i> Login / Nghena
                        </button>
                    </form>
                    
                    <hr>
                    
                    <div class="text-center">
                        <p class="mb-2">
                            <a href="{% url 'accounts:password_reset' %}" class="text-decoration-none">
                                <i class="fas fa-key"></i> Forgot Password? / U rivalile Phasiwedi?
                            </a>
                        </p>
                        
                        <p class="mb-0">
                            Don't have an account? / A wu na akhawunti? 
                            <a href="{% url 'accounts:register' %}">Register here / Titsarisa laha</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
